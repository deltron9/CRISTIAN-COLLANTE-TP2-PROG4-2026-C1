@if (this.auth.usuarioActual() && this.auth.sesionVerificada()) {
    <nav class="barra-lateral">
        <div class="zona-marca">
            <img src="assets/logo-sinfondo.webp" alt="logo-utnials" class="logo-miniatura">
            
            <label id="theme-toggle-button">
                <input type="checkbox" id="toggle" [checked]="modoOscuro" (change)="toggleDarkMode()">
                <svg viewBox="0 0 69.667 44" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg">
                </svg>
            </label>
        </div>

        <div class="perfil-usuario">
            <img [src]="this.auth.usuarioActual()?.imagen" alt="Foto de perfil" class="avatar">
            <span class="nombre-usuario">{{ this.auth.usuarioActual()?.username }}</span>
        </div>

        <ul class="enlaces-verticales">
            <li>
                <a routerLink="/publicaciones">
                    <span class="icono"></span><i class="ri-home-8-line"> Publicaciones</i>
                </a>
            </li>
            <li>
                <a routerLink="/mi-perfil">
                    <span class="icono"></span><i class="ri-id-card-line"> Mi Perfil</i>
                </a>
            </li>
        </ul>
        
        <div class="zona-salir">
            <button (click)="cerrarSesionLimpiandoTema()" class="btn-salir">
                <i class="ri-logout-box-r-line"> Cerrar sesión</i>
            </button>
        </div>
    </nav>
} @else {
    <nav class="barra-horizontal">
        <div class="contenedor-logo-utnials">
            <img src="assets/logo-sinfondo.webp" alt="logo-utnials">
        </div>
        <ul class="enlaces-horizontales">
            <li><a routerLink="auth/login">Ingresar</a></li>
            <li><a routerLink="auth/register">Registro</a></li>
            <li><a href="https://www.utnfravirtual.org.ar/" target="_blank">Campus</a></li>
            <li><a href="https://servicios.fra.utn.edu.ar/Sysacad/loginAlumno.asp?refrescar" target="_blank">Sysacad</a></li>
        </ul>
    </nav>
}
